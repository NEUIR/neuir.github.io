{{ " " }}
<div class="card" data-style="{{ include.style }}">
  {% if include.link %}
    <a
      href="{{ include.link | relative_url }}"
      aria-label="{{ include.title | default: "card link" }}"
      class="card-image"
    >
  {% else %}
    <span class="card-image">
  {% endif %}
    <img
      src="{{ include.image | relative_url }}"
      alt="{{ include.title | default: "card image" }}"
      loading="lazy"
      decoding="async"
      {% include fallback.html %}
    >
  {% if include.link %}
    </a>
  {% else %}
    </span>
  {% endif %}

  <div class="card-text">
    {% if include.title %}
      <a
        {% if include.link %}
          href="{{ include.link | relative_url }}"
        {% endif %}
        {% if include.tooltip %}
          data-tooltip="{{ include.tooltip }}"
        {% endif %}
        class="card-title"
      >
        {{ include.title }}
    </a>
    {% endif %}

    {% if include.subtitle %}
      <span class="card-subtitle">{{ include.subtitle }}</span>
    {% endif %}

    {% if include.link and include.repo %}
      <a href="{{ include.link }}">
        <img
          src="https://img.shields.io/github/stars/{{ include.repo }}?style=social&label=Code+Stars"
          alt="{{ include.title | default: include.repo }} GitHub stars"
          loading="lazy"
          decoding="async"
        >
      </a>
    {% endif %}

    <!-- {% if include.description %}
      <p>
        {{ include.description | markdownify | remove: "<p>" | remove: "</p>" }}
      </p>
    {% endif %} -->

    <!-- {% if include.tags or include.repo %}
      {% include tags.html tags=include.tags repo=include.repo %}
    {% endif %} -->
  </div>
</div>
